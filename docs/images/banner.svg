<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7209b7;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#7209b7"/>
      <stop offset="100%" style="stop-color:#7209b7;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>

  <!-- Decorative grid -->
  <g opacity="0.05" stroke="white" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="700" cy="40" r="60" fill="#7209b7" opacity="0.06"/>
  <circle cx="720" cy="160" r="40" fill="#7209b7" opacity="0.04"/>
  <circle cx="80" cy="160" r="45" fill="#7209b7" opacity="0.05"/>

  <!-- Project number badge -->
  <rect x="30" y="25" width="70" height="32" rx="16" fill="#7209b7" opacity="0.9" filter="url(#shadow)"/>
  <text x="65" y="47" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="white">#75</text>

  <!-- Main title -->
  <text x="400" y="90" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="bold" fill="white" filter="url(#glow)">
    📊  Log File Analyzer
  </text>

  <!-- Tagline -->
  <text x="400" y="125" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#a0aec0">
    Pattern Detection, Error Clustering & Anomaly Analysis
  </text>

  <!-- Tech badges -->
  <g transform="translate(220, 145)">
    <rect width="75" height="22" rx="11" fill="white" opacity="0.1"/>
    <text x="37" y="15" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0aec0">Python</text>
    <rect x="85" width="75" height="22" rx="11" fill="white" opacity="0.1"/>
    <text x="122" y="15" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0aec0">Ollama</text>
    <rect x="170" width="65" height="22" rx="11" fill="white" opacity="0.1"/>
    <text x="202" y="15" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0aec0">Click</text>
    <rect x="245" width="115" height="22" rx="11" fill="white" opacity="0.1"/>
    <text x="302" y="15" text-anchor="middle" font-family="monospace" font-size="10" fill="#a0aec0">100% Local AI</text>
  </g>

  <!-- Accent bottom bar -->
  <rect x="0" y="192" width="800" height="8" rx="0" fill="url(#accent-grad)"/>
</svg>
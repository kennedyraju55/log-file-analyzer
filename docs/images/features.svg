<svg xmlns="http://www.w3.org/2000/svg" width="800" height="350" viewBox="0 0 800 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="350" fill="url(#bg)" rx="12"/>
  <!-- Card 1 -->
  <rect x="20" y="20" width="240" height="145" rx="10" fill="#16213e" stroke="#7209b7" stroke-width="1.5" opacity="0.95"/>
  <rect x="20" y="20" width="240" height="4" rx="2" fill="#7209b7"/>
  <text x="140" y="60" text-anchor="middle" font-size="28">🔍</text>
  <text x="140" y="88" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Pattern Matching</text>
    <text x="140" y="115" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">10 built-in patterns:</text>
    <text x="140" y="133" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">DB, auth, HTTP, timeout, etc.</text>

  <!-- Card 2 -->
  <rect x="280" y="20" width="240" height="145" rx="10" fill="#16213e" stroke="#7209b7" stroke-width="1.5" opacity="0.95"/>
  <rect x="280" y="20" width="240" height="4" rx="2" fill="#7209b7"/>
  <text x="400" y="60" text-anchor="middle" font-size="28">🗂️</text>
  <text x="400" y="88" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Error Clustering</text>
    <text x="400" y="115" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">Group similar errors</text>
    <text x="400" y="133" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">by pattern similarity</text>

  <!-- Card 3 -->
  <rect x="540" y="20" width="240" height="145" rx="10" fill="#16213e" stroke="#7209b7" stroke-width="1.5" opacity="0.95"/>
  <rect x="540" y="20" width="240" height="4" rx="2" fill="#7209b7"/>
  <text x="660" y="60" text-anchor="middle" font-size="28">📈</text>
  <text x="660" y="88" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Log Statistics</text>
    <text x="660" y="115" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">Level distribution,</text>
    <text x="660" y="133" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">line counts & timestamps</text>

  <!-- Card 4 -->
  <rect x="20" y="185" width="240" height="145" rx="10" fill="#16213e" stroke="#7209b7" stroke-width="1.5" opacity="0.95"/>
  <rect x="20" y="185" width="240" height="4" rx="2" fill="#7209b7"/>
  <text x="140" y="225" text-anchor="middle" font-size="28">🚨</text>
  <text x="140" y="253" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Alert Engine</text>
    <text x="140" y="280" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">Configurable thresholds</text>
    <text x="140" y="298" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">for auto-alerting</text>

  <!-- Card 5 -->
  <rect x="280" y="185" width="240" height="145" rx="10" fill="#16213e" stroke="#7209b7" stroke-width="1.5" opacity="0.95"/>
  <rect x="280" y="185" width="240" height="4" rx="2" fill="#7209b7"/>
  <text x="400" y="225" text-anchor="middle" font-size="28">⏱️</text>
  <text x="400" y="253" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="white">Time Analysis</text>
    <text x="400" y="280" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">Timestamp extraction</text>
    <text x="400" y="298" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">and temporal patterns</text>

  <!-- Card 6 -->
  <rect x="540" y="185" width="240" height="145" rx="10" fill="#16213e" stroke="#7209b7" stroke-width="1.5" opacity="0.95"/>
  <rect x="540" y="185" width="240" height="4" rx="2" fill="#7209b7"/>
  <text x="660" y="225" text-anchor="middle" font-size="28">🤖</text>
  <text x="660" y="253" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="bold" fill="white">AI Root Cause</text>
    <text x="660" y="280" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">LLM-powered analysis</text>
    <text x="660" y="298" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" fill="#a0aec0">for root cause detection</text>

</svg>